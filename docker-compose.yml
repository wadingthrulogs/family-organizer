services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/app.db
      - SQLITE_PATH=/data/app.db
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:80}
      - TZ=${TZ:-UTC}
      - SESSION_SECURE=${SESSION_SECURE:-false}
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - sqlite_data:/data
      - uploads_data:/app/uploads
    expose:
      - '3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    volumes:
      - tailscale_certs:/etc/ssl/tailscale:ro
    ports:
      - '${APP_PORT:-80}:${APP_PORT:-80}'
    depends_on:
      backend:
        condition: service_healthy

  # Tailscale sidecar — only active when COMPOSE_PROFILES=tailscale (set by setup.sh)
  tailscale:
    image: tailscale/tailscale:latest
    profiles: [tailscale]
    hostname: ${TS_HOSTNAME:-family-organizer}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale_state:/var/lib/tailscale
      - tailscale_certs:/certs
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=false
    restart: unless-stopped

volumes:
  sqlite_data:
  uploads_data:
  tailscale_state:
  tailscale_certs:
